name: Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/demo-app" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: known_hosts (custom port)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.general

      - name: inventory.ini
        run: |
          cat > ansible/inventory.ini <<'EOF'
          [servers]
          ${{ secrets.SSH_HOST }} ansible_user=${{ secrets.SSH_USER }} ansible_port=${{ secrets.SSH_PORT }}
          EOF

      - name: group_vars/all.yml (from secrets)
        run: |
          mkdir -p ansible/group_vars
          cat > ansible/group_vars/all.yml <<EOF
          app_domain: "${{ secrets.APP_DOMAIN }}"
          letsencrypt_email: "${{ secrets.LETSENCRYPT_EMAIL }}"
          ssh_port: ${{ secrets.SSH_PORT }}
          app_replicas: ${{ secrets.APP_REPLICAS }}
          mariadb_image: "${{ secrets.MARIADB_IMAGE }}"
          k9s_version: "${{ secrets.K9S_VERSION }}"
          app_image: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          mariadb_root_password: "${{ secrets.MARIADB_ROOT_PASSWORD }}"
          mariadb_database: "${{ secrets.MARIADB_DATABASE }}"
          mariadb_user: "${{ secrets.MARIADB_USER }}"
          mariadb_password: "${{ secrets.MARIADB_PASSWORD }}"
          EOF

      - name: Run deploy.yml
        run: |
          cd ansible
          ansible-playbook -i inventory.ini deploy.yml
