name: First Install

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  first_install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts (initial port 22)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Install Ansible + deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.general

      - name: Generate inventory.ini (initial port 22)
        run: |
          cat > ansible/inventory.ini <<'EOF'
          [servers]
          ${{ secrets.SSH_HOST }} ansible_user=${{ secrets.SSH_USER }} ansible_port=22
          EOF

      - name: Generate group_vars/all.yml from GitHub Secrets
        run: |
          mkdir -p ansible/group_vars
          cat > ansible/group_vars/all.yml <<EOF
          app_domain: "${{ secrets.APP_DOMAIN }}"
          letsencrypt_email: "${{ secrets.LETSENCRYPT_EMAIL }}"
          ssh_port: ${{ secrets.SSH_PORT }}
          app_replicas: ${{ secrets.APP_REPLICAS }}
          mariadb_image: "${{ secrets.MARIADB_IMAGE }}"
          app_image: "ghcr.io/placeholder/placeholder:first_install"
          mariadb_root_password: "${{ secrets.MARIADB_ROOT_PASSWORD }}"
          mariadb_database: "${{ secrets.MARIADB_DATABASE }}"
          mariadb_user: "${{ secrets.MARIADB_USER }}"
          mariadb_password: "${{ secrets.MARIADB_PASSWORD }}"
          EOF

      - name: First install (bootstrap server)
        run: |
          cd ansible
          ansible-playbook -i inventory.ini bootstrap.yml
