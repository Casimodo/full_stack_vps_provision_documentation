---
- name: Maintenance (system security updates + MariaDB image upgrade example)
  hosts: servers
  become: true

  vars:
    # Si tu veux forcer un reboot auto en maintenance
    reboot_if_needed: true

  tasks:
    # ---------- System updates ----------
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade packages (security/bugfixes)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required (optional)
      ansible.builtin.reboot:
        msg: "Reboot triggered by maintenance playbook (security updates)"
        reboot_timeout: 900
      when: reboot_if_needed and reboot_required.stat.exists

    # ---------- MariaDB upgrade example ----------
    # Ici on montre le mécanisme : changer l'image mariadb via variable, appliquer et attendre.
    # Avec 1 replica DB, il y aura un redémarrage (donc une courte indispo DB).
    - name: Render MariaDB manifest (image injected)
      ansible.builtin.template:
        src: ../k8s/mariadb.yaml
        dest: /root/demo-deploy/k8s/mariadb.rendered.yaml
        mode: "0644"

    - name: Apply MariaDB manifest (upgrade if image changed)
      ansible.builtin.shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f /root/demo-deploy/k8s/mariadb.rendered.yaml

    - name: Wait for MariaDB pod to be Ready after upgrade
      ansible.builtin.shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl -n demo wait --for=condition=Ready pod -l app=mariadb --timeout=300s
      changed_when: false
