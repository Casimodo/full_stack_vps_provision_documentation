---
- name: Deploy demo stack (MariaDB + Node app + Ingress TLS)
  hosts: servers
  become: true

  tasks:
    - name: Create working directory on server
      ansible.builtin.file:
        path: /root/demo-deploy
        state: directory
        mode: "0755"

    - name: Copy Kubernetes manifests (raw + templates)
      ansible.builtin.copy:
        src: ../k8s/
        dest: /root/demo-deploy/k8s/
        mode: "0644"

    - name: Render issuer (ClusterIssuer)
      ansible.builtin.template:
        src: ../k8s/templates/issuer-letsencrypt.yaml.j2
        dest: /root/demo-deploy/k8s/issuer-letsencrypt.yaml
        mode: "0644"

    - name: Render app manifest (replicas + image injected)
      ansible.builtin.template:
        src: ../k8s/templates/app.yaml.j2
        dest: /root/demo-deploy/k8s/app.yaml
        mode: "0644"

    - name: Render ingress (domain injected)
      ansible.builtin.template:
        src: ../k8s/templates/ingress.yaml.j2
        dest: /root/demo-deploy/k8s/ingress.yaml
        mode: "0644"

    - name: Apply namespace
      ansible.builtin.shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f /root/demo-deploy/k8s/namespace.yaml

    - name: Create/Update MariaDB Secret from vars
      ansible.builtin.shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl -n demo create secret generic mariadb-secret \
          --from-literal=MARIADB_ROOT_PASSWORD='{{ mariadb_root_password }}' \
          --from-literal=MARIADB_DATABASE='{{ mariadb_database }}' \
          --from-literal=MARIADB_USER='{{ mariadb_user }}' \
          --from-literal=MARIADB_PASSWORD='{{ mariadb_password }}' \
          --dry-run=client -o yaml | KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f -

    - name: Render MariaDB manifest (image injected + default)
      ansible.builtin.template:
        src: ../k8s/mariadb.yaml
        dest: /root/demo-deploy/k8s/mariadb.rendered.yaml
        mode: "0644"

    - name: Apply MariaDB
      ansible.builtin.shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f /root/demo-deploy/k8s/mariadb.rendered.yaml

    - name: Apply cert-manager issuer
      ansible.builtin.shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f /root/demo-deploy/k8s/issuer-letsencrypt.yaml

    - name: Apply App
      ansible.builtin.shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f /root/demo-deploy/k8s/app.yaml

    - name: Apply Ingress
      ansible.builtin.shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f /root/demo-deploy/k8s/ingress.yaml
