---
- name: Bootstrap server (UFW + SSH port + Fail2ban + k3s + helm + cert-manager + k9s)
  hosts: servers
  become: true

  vars:
    helm_version: "v3.14.4"
    cert_manager_namespace: "cert-manager"
    cert_manager_chart_version: "v1.14.5"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name: [curl, ca-certificates, gnupg, ufw, git, fail2ban]
        state: present

    - name: Allow SSH (new port)
      community.general.ufw:
        rule: allow
        port: "{{ ssh_port }}"
        proto: tcp

    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Ensure SSHD listens on custom port
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port\s+'
        line: "Port {{ ssh_port }}"
        backup: true

    - name: Reload SSH service
      ansible.builtin.service:
        name: ssh
        state: reloaded

    - name: Configure fail2ban jail for sshd
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/sshd.local
        mode: "0644"
        content: |
          [sshd]
          enabled = true
          port = {{ ssh_port }}
          maxretry = 5
          bantime = 1h
          findtime = 10m
          backend = systemd

    - name: Enable and restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted
        enabled: true

    - name: Install k3s
      ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure kubectl symlink exists
      ansible.builtin.shell: ln -sf /usr/local/bin/k3s /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: Create /root/.kube directory
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: "0700"

    - name: Copy k3s kubeconfig to /root/.kube/config
      ansible.builtin.copy:
        remote_src: true
        src: /etc/rancher/k3s/k3s.yaml
        dest: /root/.kube/config
        mode: "0600"

    - name: Wait for Kubernetes API to be ready
      ansible.builtin.shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get nodes
      register: k8s_ready
      retries: 30
      delay: 2
      until: k8s_ready.rc == 0
      changed_when: false

    - name: Install Helm
      ansible.builtin.shell: |
        set -e
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH=amd64 ;;
          aarch64) ARCH=arm64 ;;
          *) echo "Unsupported arch: $ARCH" ; exit 1 ;;
        esac
        curl -fsSL -o /tmp/helm.tgz https://get.helm.sh/helm-{{ helm_version }}-linux-${ARCH}.tar.gz
        tar -xzf /tmp/helm.tgz -C /tmp
        install -m 0755 /tmp/linux-${ARCH}/helm /usr/local/bin/helm
      args:
        creates: /usr/local/bin/helm

    - name: Install/Update k9s (version from k9s_version)
      ansible.builtin.shell: |
        set -e
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH=amd64 ;;
          aarch64) ARCH=arm64 ;;
          *) echo "Unsupported arch: $ARCH" ; exit 1 ;;
        esac
        VER="{{ k9s_version | default('v0.50.18') }}"
        curl -fsSL -o /tmp/k9s.tgz "https://github.com/derailed/k9s/releases/download/${VER}/k9s_Linux_${ARCH}.tar.gz"
        tar -xzf /tmp/k9s.tgz -C /tmp k9s
        install -m 0755 /tmp/k9s /usr/local/bin/k9s
        k9s version || true

    - name: Add jetstack helm repo + update
      ansible.builtin.shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm repo add jetstack https://charts.jetstack.io || true
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm repo update
      changed_when: false

    - name: Create cert-manager namespace (if needed)
      ansible.builtin.shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get ns {{ cert_manager_namespace }} >/dev/null 2>&1 ||         KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl create ns {{ cert_manager_namespace }}
      changed_when: false

    - name: Install/Upgrade cert-manager
      ansible.builtin.shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm upgrade --install cert-manager jetstack/cert-manager           --namespace {{ cert_manager_namespace }}           --version {{ cert_manager_chart_version }}           --set installCRDs=true
